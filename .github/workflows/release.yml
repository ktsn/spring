name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-npm:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1
        with:
          node-version: 24
          cache: true
          registry-url: 'https://registry.npmjs.org'

      - name: Build
        run: ./scripts/build.sh

      - name: Publish to npm
        run: vp pm publish --access public --provenance --no-git-checks
